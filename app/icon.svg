<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="aipmg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F8BFF"/>
      <stop offset="50%" stop-color="#16B8E0"/>
      <stop offset="100%" stop-color="#00DDD0"/>
    </linearGradient>
  </defs>
  <!-- 角丸矩形 (細いストロークだけ、塗りつぶしは白) -->
  <rect x="8" y="8" width="240" height="240" rx="40" ry="40"
        fill="white" stroke="url(#aipmg)" stroke-width="4"/>
  <!-- 開いた円弧 (下が開いた約 290° の弧、ロゴの "AI" を囲む) -->
  <path d="M 70 198 A 78 78 0 1 1 186 198"
        fill="none" stroke="url(#aipmg)" stroke-width="12"
        stroke-linecap="round"/>
  <!-- "AI" (中央、大きく) -->
  <text x="128" y="160" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="76" font-weight="700" letter-spacing="-2"
        fill="url(#aipmg)">AI</text>
  <!-- "PM" (右下、小さく) -->
  <text x="178" y="218" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="32" font-weight="700"
        fill="url(#aipmg)">PM</text>
</svg>
